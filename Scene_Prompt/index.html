<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Prompt</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nunito:wght@300;400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2026.06.25-bg10">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">ORANGEMANIA TOOL</p>
        <h1>Scene Prompt</h1>
        <p class="version-label">2026.06.25-bg10</p>
      </div>
      <p class="lead">
        人物あり・背景のみを切り替えながら、カメラワーク、構図、空間演出を選んで画像生成プロンプトを作れます。
      </p>
    </header>

    <div class="workspace">
      <section class="panel input-panel" aria-labelledby="form-title">
        <div class="panel-heading">
          <p class="eyebrow">INPUT</p>
          <h2 id="form-title">シーン設定</h2>
        </div>

        <form id="promptForm">
          <div class="field-card mode-card">
            <label>生成対象</label>
            <div class="segmented-control mode-control" role="radiogroup" aria-label="生成対象">
              <label>
                <input type="radio" name="generationMode" value="person" checked>
                <span>人物あり</span>
              </label>
              <label>
                <input type="radio" name="generationMode" value="background">
                <span>背景のみ</span>
              </label>
            </div>
          </div>

          <div class="field-card subject-card" data-person-field>
            <label for="subject">被写体・表情・動作</label>
            <div class="reference-upload">
              <p class="sub-label">被写体の参照画像</p>
              <div class="segmented-control" role="radiogroup" aria-label="被写体の参照画像">
                <label>
                  <input type="radio" name="subjectReference" value="none" checked>
                  <span>無</span>
                </label>
                <label>
                  <input type="radio" name="subjectReference" value="yes">
                  <span>有</span>
                </label>
              </div>
              <p class="hint">有の場合、添付画像のキャラクター、画風、線、色味をプロンプトに反映します。</p>
            </div>
            <textarea id="subject" name="subject" class="prompt-input" rows="2" placeholder="例：添付のキャラクターが頭を抱えて「うぉー！」と叫びながらパソコンに向かっている"></textarea>
          </div>

          <div class="field-card background-card">
            <label for="background">場所・背景</label>
            <div class="reference-upload">
              <p class="sub-label">場所・背景の参照画像</p>
              <div class="segmented-control" role="radiogroup" aria-label="場所・背景の参照画像">
                <label>
                  <input type="radio" name="backgroundReference" value="none" checked>
                  <span>無</span>
                </label>
                <label>
                  <input type="radio" name="backgroundReference" value="yes">
                  <span>有</span>
                </label>
              </div>
              <p class="hint" id="backgroundReferenceHint">有の場合、添付画像の場所・背景をプロンプトに反映します。</p>
            </div>
            <textarea id="background" name="background" class="prompt-input" rows="2" placeholder="例：明るいカフェ店内、木製の机、大きな窓、観葉植物、本棚、生活感がある"></textarea>
          </div>

          <div class="field-card field-card-wide">
            <label for="aspect">アスペクト比</label>
            <select id="aspect" name="aspect"></select>
            <p class="hint" id="aspectDescription">スマホ表示や縦長SNS投稿に向いた比率です。</p>
          </div>

          <div class="field-grid">
            <div class="field-card" data-person-field>
              <label for="shot">映す範囲（ショット）</label>
              <select id="shot" name="shot"></select>
            </div>

            <div class="field-card" data-person-field>
              <label for="direction">被写体の向き</label>
              <select id="direction" name="direction"></select>
            </div>

            <div class="field-card" data-person-field>
              <label for="subjectPlacement">被写体の配置</label>
              <select id="subjectPlacement" name="subjectPlacement"></select>
            </div>

            <div class="field-card" data-background-field>
              <label for="alternateViewpoint">別アングル</label>
              <select id="alternateViewpoint" name="alternateViewpoint"></select>
            </div>

            <div class="field-card">
              <label for="cameraView">見る方向（カメラビュー）</label>
              <select id="cameraView" name="cameraView"></select>
            </div>

            <div class="field-card">
              <label for="angle">上下の角度（カメラ角度）</label>
              <select id="angle" name="angle"></select>
            </div>

            <div class="field-card">
              <label for="screenComposition">配置（構図）</label>
              <select id="screenComposition" name="screenComposition"></select>
            </div>

            <div class="field-card">
              <label for="motionBackground">演出・臨場感</label>
              <select id="motionBackground" name="motionBackground"></select>
            </div>

            <div class="field-card">
              <label for="effect">漫画演出</label>
              <select id="effect" name="effect"></select>
            </div>

            <div class="field-card">
              <label for="depth">レンズ感・奥行き</label>
              <select id="depth" name="depth"></select>
            </div>

            <div class="field-card" data-background-field>
              <label for="timeOfDay">時間帯</label>
              <select id="timeOfDay" name="timeOfDay"></select>
            </div>

            <div class="field-card" data-background-field>
              <label for="weatherLight">天気・光</label>
              <select id="weatherLight" name="weatherLight"></select>
            </div>

            <div class="field-card" data-background-field>
              <label for="atmosphere">雰囲気</label>
              <select id="atmosphere" name="atmosphere"></select>
            </div>
          </div>

          <div class="actions">
            <button class="button button-primary" type="submit">再生成</button>
            <button class="button button-secondary" type="button" id="resetButton">リセット</button>
          </div>
        </form>
      </section>

      <section class="panel output-panel" aria-labelledby="output-title">
        <div class="panel-heading">
          <p class="eyebrow">OUTPUT</p>
          <h2 id="output-title">生成結果</h2>
        </div>

        <article class="prompt-card">
          <div class="prompt-header">
            <div>
              <p class="eyebrow">JAPANESE</p>
              <h3>日本語プロンプト</h3>
            </div>
            <button class="copy-button" type="button" data-copy-target="jpPrompt">日本語コピー</button>
          </div>
          <textarea id="jpPrompt" readonly></textarea>
        </article>

        <article class="prompt-card">
          <div class="prompt-header">
            <div>
              <p class="eyebrow">ENGLISH</p>
              <h3>英語プロンプト</h3>
            </div>
            <button class="copy-button" type="button" data-copy-target="enPrompt">英語コピー</button>
          </div>
          <textarea id="enPrompt" readonly></textarea>
        </article>

        <p class="copy-status" id="copyStatus" aria-live="polite"></p>
      </section>
    </div>
  </main>

  <script src="script.js?v=2026.06.25-bg10"></script>
</body>
</html>
