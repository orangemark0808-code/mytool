name: Deploy PROMPT-STOCK to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Firebase secrets
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          test -n "$FIREBASE_API_KEY"
          test -n "$FIREBASE_AUTH_DOMAIN"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_STORAGE_BUCKET"
          test -n "$FIREBASE_MESSAGING_SENDER_ID"
          test -n "$FIREBASE_APP_ID"
          test -n "$FIREBASE_MEASUREMENT_ID"

      - name: Prepare site
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          mkdir -p dist/PROMPT_STOCK
          mkdir -p dist/Scene_Prompt
          mkdir -p dist/horoscope
          mkdir -p dist/netakiroku
          mkdir -p dist/MITAMONO
          cp "index.html" "dist/index.html"
          cp "PROMPT_STOCK/index.html" "dist/PROMPT_STOCK/index.html"
          cp "PROMPT_STOCK/README.md" "dist/PROMPT_STOCK/README.md"
          cp "Scene_Prompt/index.html" "dist/Scene_Prompt/index.html"
          cp "Scene_Prompt/style.css" "dist/Scene_Prompt/style.css"
          cp "Scene_Prompt/script.js" "dist/Scene_Prompt/script.js"
          cp "Scene_Prompt/favicon.svg" "dist/Scene_Prompt/favicon.svg"
          cp "horoscope/index.html" "dist/horoscope/index.html"
          cp "horoscope/favicon.svg" "dist/horoscope/favicon.svg"
          cp "netakiroku/index.html" "dist/netakiroku/index.html"
          cp "netakiroku/app.js" "dist/netakiroku/app.js"
          cp "netakiroku/styles.css" "dist/netakiroku/styles.css"
          cp "netakiroku/README.md" "dist/netakiroku/README.md"
          cp "MITAMONO/index.html" "dist/MITAMONO/index.html"
          cp "MITAMONO/README.md" "dist/MITAMONO/README.md"
          cat > "dist/firebase-config.js" <<'EOF'
          window.PROMPT_STOCK_FIREBASE_CONFIG = {
            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "__FIREBASE_AUTH_DOMAIN__",
            projectId: "__FIREBASE_PROJECT_ID__",
            storageBucket: "__FIREBASE_STORAGE_BUCKET__",
            messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
            appId: "__FIREBASE_APP_ID__",
            measurementId: "__FIREBASE_MEASUREMENT_ID__",
          };
          EOF
          sed -i \
            -e "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" \
            -e "s|__FIREBASE_AUTH_DOMAIN__|$FIREBASE_AUTH_DOMAIN|g" \
            -e "s|__FIREBASE_PROJECT_ID__|$FIREBASE_PROJECT_ID|g" \
            -e "s|__FIREBASE_STORAGE_BUCKET__|$FIREBASE_STORAGE_BUCKET|g" \
            -e "s|__FIREBASE_MESSAGING_SENDER_ID__|$FIREBASE_MESSAGING_SENDER_ID|g" \
            -e "s|__FIREBASE_APP_ID__|$FIREBASE_APP_ID|g" \
            -e "s|__FIREBASE_MEASUREMENT_ID__|$FIREBASE_MEASUREMENT_ID|g" \
            "dist/firebase-config.js"
          cp "dist/firebase-config.js" "dist/PROMPT_STOCK/firebase-config.js"
          sed "s|window.PROMPT_STOCK_FIREBASE_CONFIG|window.NETAKIROKU_FIREBASE_CONFIG|" "dist/firebase-config.js" > "dist/netakiroku/firebase-config.js"
          sed "s|window.PROMPT_STOCK_FIREBASE_CONFIG|window.MITAMONO_FIREBASE_CONFIG|" "dist/firebase-config.js" > "dist/MITAMONO/firebase-config.js"
          printf 'window.MITAMONO_TMDB_KEY = "%s";\n' "$TMDB_API_KEY" > "dist/MITAMONO/tmdb-config.js"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
