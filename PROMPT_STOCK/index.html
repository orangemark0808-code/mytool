<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROMPT-STOCK</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #eaf4ff;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-solid: #ffffff;
      --text: #10243d;
      --muted: #58708d;
      --line: #cfe1f4;
      --blue-900: #073b75;
      --blue-800: #0a4f9e;
      --blue-700: #0d63c7;
      --blue-600: #1976d2;
      --blue-100: #dff0ff;
      --cyan: #00a6d6;
      --amber: #ffb020;
      --danger: #d83b52;
      --shadow: 0 22px 60px rgba(14, 73, 135, 0.18);
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
      color: var(--text);
      background: #d9ecff;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
      color: var(--blue-900);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--blue-700);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .count-pill {
      flex: 0 0 auto;
      min-width: 76px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--blue-900);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .count-pill strong {
      display: block;
      font-size: 16px;
      line-height: 1;
    }

    .count-pill span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .sync-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .account-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .account-actions[hidden] {
      display: none;
    }

    .account-user {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .app-box {
      padding: 16px;
      overflow: hidden;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input {
      height: 34px;
      padding: 0 10px;
    }

    select {
      height: 34px;
      padding: 0 10px;
    }

    textarea {
      min-height: 78px;
      padding: 12px 13px;
      line-height: 1.65;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue-600);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.14);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .editor {
      display: none;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .editor.is-open {
      display: flex;
      align-items: flex-start;
    }

    .editor .fake-checkbox {
      opacity: 0.35;
    }

    .inline-editor {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0 14px 0 0;
    }

    .inline-editor textarea {
      min-height: 44px;
      padding: 6px 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      line-height: 1.68;
      resize: vertical;
    }

    .inline-editor textarea:focus {
      box-shadow: none;
      background: transparent;
    }

    .editor-fields {
      display: grid;
      grid-template-columns: minmax(140px, 180px) 1fr;
      gap: 10px;
      align-items: start;
    }

    .btn {
      min-height: 34px;
      padding: 0 11px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--blue-700);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--blue-800);
    }

    .btn-secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue-800);
    }

    .btn-edit {
      background: var(--blue-100);
      color: var(--blue-900);
    }

    .btn-delete {
      background: #fff0f3;
      color: var(--danger);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .bulk-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .category-tools {
      display: grid;
      grid-template-columns: minmax(150px, 180px) 1fr auto auto auto;
      gap: 7px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .category-tools input {
      min-width: 0;
    }

    .search {
      position: relative;
    }

    .search input {
      padding-left: 42px;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 17px;
      height: 17px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: -5px;
      width: 8px;
      height: 2px;
      border-radius: 2px;
      background: var(--muted);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .sort-select {
      width: 154px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      outline: none;
    }

    .category-select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      outline: none;
    }

    .prompt-list {
      display: grid;
      gap: 0;
      align-content: start;
      padding: 8px 0 0;
    }

    .prompt-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: transparent;
    }

    .prompt-card.selected {
      background: rgba(25, 118, 210, 0.07);
    }

    .select-cell {
      flex: 0 0 auto;
      padding: 5px 0 5px 14px;
    }

    .select-cell input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .fake-checkbox {
      display: block;
      width: 18px;
      height: 18px;
      margin-top: 5px;
      border: 2px solid #7a8491;
      border-radius: 3px;
      background: #fff;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .select-cell input:checked + .fake-checkbox {
      border-color: var(--blue-700);
      background: var(--blue-700);
      box-shadow: inset 0 0 0 3px #fff;
    }

    .select-cell input:focus-visible + .fake-checkbox {
      outline: 3px solid rgba(25, 118, 210, 0.24);
      outline-offset: 2px;
    }

    .prompt-main {
      flex: 1 1 auto;
      min-width: 0;
      padding: 3px 14px 3px 0;
    }

    .category-cell {
      flex: 0 0 140px;
      min-width: 0;
      padding: 5px 0 4px 0;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .content {
      display: block;
      width: 100%;
      min-height: 28px;
      padding: 2px 0;
      border-radius: 6px;
      background: transparent;
      color: #233a55;
      font-size: 16px;
      line-height: 1.68;
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .category-empty {
      color: var(--muted);
      font-weight: 700;
    }

    .content:hover {
      background: #f1f8ff;
      color: var(--blue-900);
    }

    .content:focus-visible {
      outline: 3px solid rgba(25, 118, 210, 0.24);
      outline-offset: 2px;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .empty {
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--blue-900);
      font-size: 20px;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 10;
      max-width: min(360px, calc(100% - 40px));
      padding: 13px 16px;
      border-radius: 8px;
      background: #062c5b;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 16px 40px rgba(4, 32, 69, 0.32);
      opacity: 0;
      text-align: center;
      transform: translate(-50%, -50%) scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 640px);
        padding: 20px 0;
      }

      .topbar {
        align-items: stretch;
      }

      .sort-select {
        width: 100%;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .category-tools {
        grid-template-columns: 1fr;
      }

      .bulk-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      .prompt-card {
        gap: 8px;
      }

      .category-cell {
        flex-basis: 96px;
        font-size: 12px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        display: grid;
      }

      .count-pill {
        width: 100%;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <div class="eyebrow">PROMPT-STOCK</div>
        <h1>PROMPT-STOCK</h1>
        <div class="sync-status" id="syncStatus" aria-live="polite">ローカル保存</div>
      </div>
      <div class="count-pill" aria-live="polite">
        <strong id="totalCount">0</strong>
        <span>登録済み</span>
      </div>
    </header>

    <section class="layout">
      <section class="panel app-box" aria-label="PROMPT-STOCK">
        <div class="account-actions" id="accountActions">
          <span class="account-user" id="accountUser">未ログイン</span>
          <button class="btn btn-secondary" id="loginButton" type="button">ログイン</button>
          <button class="btn btn-secondary" id="logoutButton" type="button" hidden>ログアウト</button>
        </div>
        <div class="toolbar">
          <div class="search">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="文言・カテゴリで検索">
          </div>
          <select class="sort-select" id="sortSelect" aria-label="並び替え">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
            <option value="short">短い順</option>
          </select>
          <div class="bulk-actions" aria-label="選択した文言の操作">
            <button class="btn btn-primary" id="openAddButton" type="button">追加</button>
            <button class="btn btn-edit" id="editSelectedButton" type="button" disabled>編集</button>
            <button class="btn btn-delete" id="deleteSelectedButton" type="button" disabled>削除</button>
          </div>
        </div>
        <div class="category-tools" aria-label="カテゴリ管理">
          <select class="category-select" id="categoryManageSelect" aria-label="編集するカテゴリ"></select>
          <input id="categoryNameInput" type="text" autocomplete="off" placeholder="カテゴリ名">
          <button class="btn btn-primary" id="addCategoryButton" type="button">カテゴリ追加</button>
          <button class="btn btn-edit" id="renameCategoryButton" type="button">名称変更</button>
          <button class="btn btn-delete" id="deleteCategoryButton" type="button">カテゴリ削除</button>
        </div>
        <form class="editor" id="promptForm">
          <div class="select-cell" aria-hidden="true">
            <span class="fake-checkbox"></span>
          </div>
          <div class="inline-editor">
            <div class="editor-fields">
              <select class="category-select" id="promptCategory" aria-label="カテゴリ"></select>
              <textarea id="promptBody" rows="1" aria-label="文言" placeholder="文言を入力"></textarea>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" id="submitButton" type="submit">追加</button>
              <button class="btn btn-secondary" id="cancelButton" type="button">キャンセル</button>
            </div>
          </div>
        </form>
        <div class="prompt-list" id="promptList"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./firebase-config.js"></script>
  <script src="./firebase-config.local.js"></script>
  <script>
    const STORAGE_KEY = "prompt-copy-app-items";
    const CATEGORY_STORAGE_KEY = "prompt-copy-app-categories";
    const FIREBASE_CONFIG = window.PROMPT_STOCK_FIREBASE_CONFIG || window.PROMPT_COPY_FIREBASE_CONFIG || {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: "",
      measurementId: "",
    };
    const SYNC_DOCUMENT_ID = "main";

    const elements = {
      form: document.getElementById("promptForm"),
      body: document.getElementById("promptBody"),
      promptCategory: document.getElementById("promptCategory"),
      openAddButton: document.getElementById("openAddButton"),
      submitButton: document.getElementById("submitButton"),
      cancelButton: document.getElementById("cancelButton"),
      search: document.getElementById("searchInput"),
      sort: document.getElementById("sortSelect"),
      categoryManageSelect: document.getElementById("categoryManageSelect"),
      categoryNameInput: document.getElementById("categoryNameInput"),
      addCategoryButton: document.getElementById("addCategoryButton"),
      renameCategoryButton: document.getElementById("renameCategoryButton"),
      deleteCategoryButton: document.getElementById("deleteCategoryButton"),
      editSelectedButton: document.getElementById("editSelectedButton"),
      deleteSelectedButton: document.getElementById("deleteSelectedButton"),
      list: document.getElementById("promptList"),
      count: document.getElementById("totalCount"),
      syncStatus: document.getElementById("syncStatus"),
      accountActions: document.getElementById("accountActions"),
      accountUser: document.getElementById("accountUser"),
      loginButton: document.getElementById("loginButton"),
      logoutButton: document.getElementById("logoutButton"),
      toast: document.getElementById("toast"),
    };

    let categories = loadCategories();
    let prompts = loadPrompts();
    let editingId = null;
    let selectedIds = new Set();
    let toastTimer = null;
    let remoteStore = null;
    let unsubscribeRemote = null;
    let isApplyingRemoteData = false;
    let authReadyTimer = null;
    let syncReadyTimer = null;

    function loadPrompts() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(saved)) return [];
        return saved
          .map((prompt) => ({
            id: prompt.id || createId(),
            body: String(prompt.body || prompt.title || "").trim(),
            categoryId: prompt.categoryId || "",
            createdAt: prompt.createdAt || Date.now(),
            updatedAt: prompt.updatedAt || prompt.createdAt || Date.now(),
          }))
          .filter((prompt) => prompt.body);
      } catch {
        return [];
      }
    }

    function savePrompts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
      saveRemoteData();
    }

    function loadCategories() {
      try {
        const saved = JSON.parse(localStorage.getItem(CATEGORY_STORAGE_KEY));
        if (!Array.isArray(saved)) return [];
        return saved
          .map((category) => ({
            id: category.id || createId(),
            name: String(category.name || "").trim(),
          }))
          .filter((category) => category.name);
      } catch {
        return [];
      }
    }

    function saveCategories() {
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
      saveRemoteData();
    }

    function normalizePrompt(prompt) {
      return {
        id: prompt.id || createId(),
        body: String(prompt.body || prompt.title || "").trim(),
        categoryId: prompt.categoryId || "",
        createdAt: Number(prompt.createdAt || Date.now()),
        updatedAt: Number(prompt.updatedAt || prompt.createdAt || Date.now()),
      };
    }

    function normalizeCategory(category) {
      return {
        id: category.id || createId(),
        name: String(category.name || "").trim(),
      };
    }

    function isFirebaseConfigured() {
      return Boolean(
        FIREBASE_CONFIG.apiKey &&
        FIREBASE_CONFIG.authDomain &&
        FIREBASE_CONFIG.projectId &&
        FIREBASE_CONFIG.appId
      );
    }

    function getFirebaseConfigStatus() {
      if (!window.PROMPT_STOCK_FIREBASE_CONFIG && !window.PROMPT_COPY_FIREBASE_CONFIG) {
        return "firebase-config.js未読込";
      }
      if (!isFirebaseConfigured()) {
        return "firebase-config.js読込済み / 設定不足";
      }
      return `firebase-config.js読込済み / ${FIREBASE_CONFIG.projectId}`;
    }

    function setSyncStatus(message) {
      elements.syncStatus.textContent = message;
    }

    function setSignedOutUi(message = "ログインするとクラウド同期します") {
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = "未ログイン";
      elements.loginButton.hidden = false;
      elements.loginButton.disabled = false;
      elements.logoutButton.hidden = true;
      elements.logoutButton.disabled = false;
      setSyncStatus(`${message}（${getFirebaseConfigStatus()}）`);
    }

    function setSignedInUi(user) {
      const name = user.displayName || user.email || "ログイン中";
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = name;
      elements.loginButton.hidden = true;
      elements.loginButton.disabled = false;
      elements.logoutButton.hidden = false;
      elements.logoutButton.disabled = false;
    }

    function setAuthErrorUi(message) {
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = "同期エラー";
      elements.loginButton.hidden = false;
      elements.loginButton.disabled = true;
      elements.logoutButton.hidden = true;
      setSyncStatus(message);
    }

    function startAuthReadyTimer() {
      clearTimeout(authReadyTimer);
      authReadyTimer = setTimeout(() => {
        setSignedOutUi("認証の確認に時間がかかっています。ログインボタンから再ログインしてください");
      }, 8000);
    }

    function stopAuthReadyTimer() {
      clearTimeout(authReadyTimer);
      authReadyTimer = null;
    }

    function startSyncReadyTimer() {
      clearTimeout(syncReadyTimer);
      syncReadyTimer = setTimeout(() => {
        setSyncStatus("同期準備に時間がかかっています。通信状態を確認し、必要ならログアウト後に再ログインしてください");
      }, 12000);
    }

    function stopSyncReadyTimer() {
      clearTimeout(syncReadyTimer);
      syncReadyTimer = null;
    }

    function saveLocalData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
    }

    async function setupRemoteSync() {
      setSignedOutUi("同期を確認中...");

      if (!isFirebaseConfigured()) {
        setAuthErrorUi("Firebase設定が読み込まれていません。GitHub SecretsとActionsの公開結果を確認してください。");
        return;
      }

      try {
        setSyncStatus("同期を準備中...");
        const firebaseApp = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
        const authModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
        const firestore = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");
        const app = firebaseApp.initializeApp(FIREBASE_CONFIG);
        const auth = authModule.getAuth(app);
        const db = firestore.getFirestore(app);
        const provider = new authModule.GoogleAuthProvider();

        elements.loginButton.addEventListener("click", () => {
          setSyncStatus("ログイン画面を開いています...");
          authModule.signInWithPopup(auth, provider).catch(() => {
            authModule.signInWithRedirect(auth, provider).catch(() => {
              showToast("ログインできませんでした");
              setSignedOutUi("ログインできませんでした。Safariの設定と通信状態を確認してください");
            });
          });
        });
        elements.logoutButton.addEventListener("click", () => {
          authModule.signOut(auth).catch(() => {
            showToast("ログアウトできませんでした");
          });
        });

        startAuthReadyTimer();
        authModule.getRedirectResult(auth).then(() => {
          setSyncStatus("リダイレクトログイン結果を確認しました");
        }).catch((error) => {
          const detail = error && error.message ? `: ${error.message}` : "";
          setSignedOutUi(`リダイレクトログインの確認に失敗しました${detail}`);
        });

        authModule.onAuthStateChanged(auth, async (user) => {
          stopAuthReadyTimer();
          if (unsubscribeRemote) {
            unsubscribeRemote();
            unsubscribeRemote = null;
          }
          remoteStore = null;

          if (!user) {
            setSignedOutUi();
            return;
          }

          setSignedInUi(user);
          setSyncStatus("同期を準備中...");
          startSyncReadyTimer();

          try {
            const dataRef = firestore.doc(db, "users", user.uid, "promptCopyApp", SYNC_DOCUMENT_ID);
            remoteStore = { firestore, dataRef };

            const firstSnapshot = await firestore.getDoc(dataRef);
            if (firstSnapshot.exists()) {
              applyRemoteData(firstSnapshot.data());
            } else if (prompts.length > 0 || categories.length > 0) {
              await writeRemoteData();
            }

            unsubscribeRemote = firestore.onSnapshot(dataRef, (snapshot) => {
              if (!snapshot.exists()) return;
              applyRemoteData(snapshot.data());
              stopSyncReadyTimer();
              setSyncStatus("クラウド同期中");
            }, (error) => {
              stopSyncReadyTimer();
              const detail = error && error.message ? `: ${error.message}` : "";
              setSyncStatus(`同期エラー${detail}`);
            });

            stopSyncReadyTimer();
            setSyncStatus("クラウド同期中");
          } catch (error) {
            remoteStore = null;
            stopSyncReadyTimer();
            const detail = error && error.message ? `: ${error.message}` : "";
            setSyncStatus(`同期準備エラー${detail}`);
          }
        });
      } catch (error) {
        remoteStore = null;
        stopAuthReadyTimer();
        stopSyncReadyTimer();
        const detail = error && error.message ? `: ${error.message}` : "";
        setAuthErrorUi(`Firebase初期化エラー${detail}`);
      }
    }

    function applyRemoteData(data) {
      isApplyingRemoteData = true;
      prompts = Array.isArray(data.prompts)
        ? data.prompts.map(normalizePrompt).filter((prompt) => prompt.body)
        : [];
      categories = Array.isArray(data.categories)
        ? data.categories.map(normalizeCategory).filter((category) => category.name)
        : [];
      selectedIds = new Set([...selectedIds].filter((id) => prompts.some((prompt) => prompt.id === id)));
      if (editingId && !prompts.some((prompt) => prompt.id === editingId)) {
        resetForm();
      }
      saveLocalData();
      render();
      isApplyingRemoteData = false;
    }

    async function writeRemoteData() {
      if (!remoteStore || isApplyingRemoteData) return;
      await remoteStore.firestore.setDoc(remoteStore.dataRef, {
        prompts,
        categories,
        updatedAt: Date.now(),
      });
    }

    function saveRemoteData() {
      if (!remoteStore || isApplyingRemoteData) return;
      writeRemoteData().catch(() => {
        setSyncStatus("同期エラー: ローカル保存中");
      });
    }

    function createId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function getCategoryName(categoryId) {
      return categories.find((category) => category.id === categoryId)?.name || "";
    }

    function getVisiblePrompts() {
      const query = normalize(elements.search.value);
      const filtered = prompts.filter((prompt) => {
        if (!query) return true;
        return normalize(prompt.body).includes(query) || normalize(getCategoryName(prompt.categoryId)).includes(query);
      });

      return filtered.sort((a, b) => {
        if (elements.sort.value === "oldest") {
          return a.updatedAt - b.updatedAt;
        }
        if (elements.sort.value === "short") {
          return a.body.length - b.body.length;
        }
        return b.updatedAt - a.updatedAt;
      });
    }

    function render() {
      const visiblePrompts = getVisiblePrompts();
      elements.count.textContent = prompts.length.toString();
      renderCategoryOptions();
      updateBulkActions();
      elements.list.innerHTML = "";

      if (visiblePrompts.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = prompts.length === 0
          ? "<strong>まだ登録がありません</strong><span>追加ボタンから依頼文を登録できます。</span>"
          : "<strong>該当する依頼文がありません</strong><span>検索条件を変えてみてください。</span>";
        elements.list.appendChild(empty);
        return;
      }

      visiblePrompts.forEach((prompt) => {
        const card = document.createElement("article");
        card.className = selectedIds.has(prompt.id) ? "prompt-card selected" : "prompt-card";

        const selectCell = document.createElement("label");
        selectCell.className = "select-cell";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selectedIds.has(prompt.id);
        checkbox.setAttribute("aria-label", "この文言を選択");
        checkbox.addEventListener("change", () => toggleSelection(prompt.id, checkbox.checked));

        const fakeCheckbox = document.createElement("span");
        fakeCheckbox.className = "fake-checkbox";
        fakeCheckbox.setAttribute("aria-hidden", "true");

        const main = document.createElement("div");
        main.className = "prompt-main";

        const categoryCell = document.createElement("div");
        categoryCell.className = "category-cell";
        const categoryName = getCategoryName(prompt.categoryId);
        categoryCell.textContent = categoryName || "カテゴリなし";
        if (!categoryName) {
          categoryCell.classList.add("category-empty");
        }

        const content = document.createElement("button");
        content.type = "button";
        content.className = "content";
        content.textContent = prompt.body;
        content.addEventListener("click", () => copyPrompt(prompt.body));

        selectCell.append(checkbox, fakeCheckbox);
        main.append(content);
        card.append(selectCell, categoryCell, main);
        elements.list.appendChild(card);
      });
    }

    function renderCategoryOptions() {
      const currentPromptCategory = elements.promptCategory.value;
      const currentManagedCategory = elements.categoryManageSelect.value;

      elements.promptCategory.innerHTML = '<option value="">カテゴリなし</option>';
      elements.categoryManageSelect.innerHTML = '<option value="">カテゴリを選択</option>';

      categories.forEach((category) => {
        const promptOption = document.createElement("option");
        promptOption.value = category.id;
        promptOption.textContent = category.name;
        elements.promptCategory.appendChild(promptOption);

        const manageOption = document.createElement("option");
        manageOption.value = category.id;
        manageOption.textContent = category.name;
        elements.categoryManageSelect.appendChild(manageOption);
      });

      if (categories.some((category) => category.id === currentPromptCategory)) {
        elements.promptCategory.value = currentPromptCategory;
      }
      if (categories.some((category) => category.id === currentManagedCategory)) {
        elements.categoryManageSelect.value = currentManagedCategory;
      }
    }

    function updateBulkActions() {
      const selectedCount = selectedIds.size;
      elements.editSelectedButton.disabled = selectedCount !== 1;
      elements.deleteSelectedButton.disabled = selectedCount === 0;
      elements.editSelectedButton.textContent = selectedCount === 1 ? "編集" : "編集";
      elements.deleteSelectedButton.textContent = selectedCount > 0 ? `削除 (${selectedCount})` : "削除";
    }

    function toggleSelection(id, checked) {
      if (checked) {
        selectedIds.add(id);
      } else {
        selectedIds.delete(id);
      }
      render();
    }

    function resetForm() {
      editingId = null;
      elements.form.reset();
      elements.form.classList.remove("is-open");
      elements.submitButton.textContent = "追加";
      elements.promptCategory.value = "";
    }

    function openAddPrompt() {
      editingId = null;
      elements.form.reset();
      elements.form.classList.add("is-open");
      elements.submitButton.textContent = "追加";
      elements.promptCategory.value = "";
      elements.body.focus();
    }

    function startEdit(id) {
      const prompt = prompts.find((item) => item.id === id);
      if (!prompt) return;

      editingId = id;
      elements.body.value = prompt.body;
      elements.promptCategory.value = prompt.categoryId || "";
      elements.form.classList.add("is-open");
      elements.submitButton.textContent = "更新";
      elements.body.focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deletePrompt(id) {
      const prompt = prompts.find((item) => item.id === id);
      if (!prompt) return;

      const preview = prompt.body.length > 30 ? `${prompt.body.slice(0, 30)}...` : prompt.body;
      const confirmed = window.confirm(`「${preview}」を削除しますか？`);
      if (!confirmed) return;

      prompts = prompts.filter((item) => item.id !== id);
      selectedIds.delete(id);
      if (editingId === id) {
        resetForm();
      }
      savePrompts();
      render();
      showToast("削除しました");
    }

    function editSelectedPrompt() {
      if (selectedIds.size !== 1) {
        showToast("編集する文言を1つだけ選択してください");
        return;
      }
      startEdit([...selectedIds][0]);
    }

    function deleteSelectedPrompts() {
      if (selectedIds.size === 0) {
        showToast("削除する文言を選択してください");
        return;
      }

      const targets = prompts.filter((prompt) => selectedIds.has(prompt.id));
      const confirmed = window.confirm(`${targets.length}件の文言を削除しますか？`);
      if (!confirmed) return;

      prompts = prompts.filter((prompt) => !selectedIds.has(prompt.id));
      if (editingId && selectedIds.has(editingId)) {
        resetForm();
      }
      selectedIds = new Set();
      savePrompts();
      render();
      showToast("削除しました");
    }

    async function copyPrompt(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
        showToast("コピーしました");
      } catch {
        fallbackCopy(text);
        showToast("コピーしました");
      }
    }

    function fallbackCopy(text) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      elements.toast.textContent = message;
      elements.toast.classList.add("show");
      toastTimer = setTimeout(() => {
        elements.toast.classList.remove("show");
      }, 1800);
    }

    elements.form.addEventListener("submit", (event) => {
      event.preventDefault();

      const body = elements.body.value.trim();
      const categoryId = elements.promptCategory.value;

      if (!body) {
        showToast("文言を入力してください");
        return;
      }

      const now = Date.now();

      if (editingId) {
        prompts = prompts.map((prompt) => {
          if (prompt.id !== editingId) return prompt;
          return { ...prompt, body, categoryId, updatedAt: now };
        });
        showToast("更新しました");
      } else {
        prompts.unshift({
          id: createId(),
          body,
          categoryId,
          createdAt: now,
          updatedAt: now,
        });
        showToast("追加しました");
      }

      savePrompts();
      selectedIds = new Set();
      resetForm();
      render();
    });

    function addCategory() {
      const name = elements.categoryNameInput.value.trim();
      if (!name) {
        showToast("カテゴリ名を入力してください");
        return;
      }
      if (categories.some((category) => category.name === name)) {
        showToast("同じカテゴリがあります");
        return;
      }
      const category = { id: createId(), name };
      categories.push(category);
      saveCategories();
      elements.categoryNameInput.value = "";
      render();
      elements.categoryManageSelect.value = category.id;
      elements.promptCategory.value = category.id;
      showToast("カテゴリを追加しました");
    }

    function renameCategory() {
      const id = elements.categoryManageSelect.value;
      const name = elements.categoryNameInput.value.trim();
      if (!id) {
        showToast("カテゴリを選択してください");
        return;
      }
      if (!name) {
        showToast("カテゴリ名を入力してください");
        return;
      }
      categories = categories.map((category) => (
        category.id === id ? { ...category, name } : category
      ));
      saveCategories();
      render();
      elements.categoryManageSelect.value = id;
      showToast("カテゴリ名を変更しました");
    }

    function deleteCategory() {
      const id = elements.categoryManageSelect.value;
      if (!id) {
        showToast("カテゴリを選択してください");
        return;
      }
      const categoryName = getCategoryName(id);
      const confirmed = window.confirm(`カテゴリ「${categoryName}」を削除しますか？\nこのカテゴリの文言は「カテゴリなし」になります。`);
      if (!confirmed) return;

      categories = categories.filter((category) => category.id !== id);
      prompts = prompts.map((prompt) => (
        prompt.categoryId === id ? { ...prompt, categoryId: "" } : prompt
      ));
      saveCategories();
      savePrompts();
      elements.categoryNameInput.value = "";
      render();
      showToast("カテゴリを削除しました");
    }

    elements.openAddButton.addEventListener("click", openAddPrompt);
    elements.cancelButton.addEventListener("click", resetForm);
    elements.search.addEventListener("input", render);
    elements.sort.addEventListener("change", render);
    elements.categoryManageSelect.addEventListener("change", () => {
      elements.categoryNameInput.value = getCategoryName(elements.categoryManageSelect.value);
    });
    elements.addCategoryButton.addEventListener("click", addCategory);
    elements.renameCategoryButton.addEventListener("click", renameCategory);
    elements.deleteCategoryButton.addEventListener("click", deleteCategory);
    elements.editSelectedButton.addEventListener("click", editSelectedPrompt);
    elements.deleteSelectedButton.addEventListener("click", deleteSelectedPrompts);

    render();
    setupRemoteSync();
  </script>
</body>
</html>
