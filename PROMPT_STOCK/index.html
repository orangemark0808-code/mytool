<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROMPT-STOCK</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #eaf4ff;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-solid: #ffffff;
      --text: #10243d;
      --muted: #58708d;
      --line: #cfe1f4;
      --blue-900: #073b75;
      --blue-800: #0a4f9e;
      --blue-700: #0d63c7;
      --blue-600: #1976d2;
      --blue-100: #dff0ff;
      --cyan: #00a6d6;
      --amber: #ffb020;
      --danger: #d83b52;
      --shadow: 0 22px 60px rgba(14, 73, 135, 0.18);
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
      color: var(--text);
      background: #d9ecff;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
      color: var(--blue-900);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--blue-700);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .count-pill {
      flex: 0 0 auto;
      min-width: 76px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--blue-900);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .count-pill strong {
      display: block;
      font-size: 16px;
      line-height: 1;
    }

    .count-pill span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .sync-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .account-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .account-actions[hidden] {
      display: none;
    }

    .account-user {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .app-box {
      padding: 16px;
      overflow: hidden;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input {
      height: 34px;
      padding: 0 10px;
    }

    select {
      height: 34px;
      padding: 0 10px;
    }

    textarea {
      min-height: 78px;
      padding: 12px 13px;
      line-height: 1.45;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue-600);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.14);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .type-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--line);
    }

    .tab-button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-800);
      font-size: 13px;
      font-weight: 900;
    }

    .tab-button.is-active {
      border-color: var(--blue-700);
      background: var(--blue-700);
      color: #fff;
    }

    .editor {
      display: none;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .editor.is-open {
      display: flex;
      align-items: flex-start;
    }

    .editor .fake-checkbox {
      opacity: 0.35;
    }

    .inline-editor {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0 14px 0 0;
    }

    .inline-editor textarea {
      min-height: 150px;
      padding: 10px 12px;
      border: 0;
      border-radius: 0;
      background: transparent;
      line-height: 1.45;
      resize: vertical;
    }

    .inline-editor textarea:focus {
      box-shadow: none;
      background: transparent;
    }

    .editor-fields {
      display: grid;
      grid-template-columns: minmax(120px, 160px) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .title-field {
      display: none;
      grid-column: 1 / -1;
    }

    .editor.is-long .title-field {
      display: block;
    }

    .btn {
      min-height: 34px;
      padding: 0 11px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--blue-700);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--blue-800);
    }

    .btn-secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue-800);
    }

    .btn-edit {
      background: var(--blue-100);
      color: var(--blue-900);
    }

    .btn-delete {
      background: #fff0f3;
      color: var(--danger);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr minmax(130px, 170px) auto auto auto;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .bulk-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .icon-button {
      width: 34px;
      min-width: 34px;
      padding: 0;
      font-size: 16px;
    }

    .view[hidden] {
      display: none;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .settings-header h2 {
      color: var(--blue-900);
      font-size: 22px;
      line-height: 1.2;
    }

    .settings-section {
      display: grid;
      gap: 12px;
      padding: 16px 0 0;
    }

    .settings-section h3 {
      color: var(--blue-900);
      font-size: 15px;
      line-height: 1.3;
    }

    .settings-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .category-list {
      display: grid;
      gap: 8px;
    }

    .category-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(207, 225, 244, 0.88);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .category-row.is-dragging {
      opacity: 0.48;
      transform: scale(0.995);
    }

    .category-row.is-drop-target {
      border-color: var(--blue-700);
      box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.13);
    }

    .search {
      position: relative;
    }

    .search input {
      padding-left: 42px;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 17px;
      height: 17px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: -5px;
      width: 8px;
      height: 2px;
      border-radius: 2px;
      background: var(--muted);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .sort-select {
      width: 154px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      outline: none;
    }

    .category-select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      outline: none;
    }

    .prompt-list {
      display: grid;
      gap: 8px;
      align-content: start;
      padding: 8px 0 0;
    }

    .prompt-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid rgba(207, 225, 244, 0.88);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, transform 0.15s ease;
    }

    .prompt-card.selected {
      background: rgba(25, 118, 210, 0.07);
    }

    .prompt-card.is-dragging {
      opacity: 0.48;
      transform: scale(0.995);
    }

    .prompt-card.is-drop-target {
      border-color: var(--blue-700);
      box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.13);
    }

    .select-cell {
      flex: 0 0 auto;
      padding: 5px 0 5px 14px;
    }

    .select-cell input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .fake-checkbox {
      display: block;
      width: 18px;
      height: 18px;
      margin-top: 5px;
      border: 2px solid #7a8491;
      border-radius: 3px;
      background: #fff;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .select-cell input:checked + .fake-checkbox {
      border-color: var(--blue-700);
      background: var(--blue-700);
      box-shadow: inset 0 0 0 3px #fff;
    }

    .select-cell input:focus-visible + .fake-checkbox {
      outline: 3px solid rgba(25, 118, 210, 0.24);
      outline-offset: 2px;
    }

    .order-cell {
      flex: 0 0 auto;
      display: grid;
      gap: 4px;
      justify-items: center;
      padding: 5px 0;
    }

    .drag-handle {
      min-width: 26px;
      min-height: 30px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-800);
      font-size: 17px;
      line-height: 1;
      font-weight: 900;
      cursor: grab;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .drag-handle:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .mobile-order-actions {
      display: none;
      gap: 3px;
    }

    .order-button {
      min-width: 24px;
      min-height: 24px;
      padding: 0 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue-800);
      font-size: 12px;
      font-weight: 900;
    }

    .prompt-main {
      flex: 1 1 auto;
      min-width: 0;
      padding: 3px 14px 3px 0;
    }

    .category-cell {
      flex: 0 0 140px;
      min-width: 0;
      padding: 5px 0 4px 0;
      color: var(--blue-900);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .content {
      display: block;
      width: 100%;
      min-height: 28px;
      padding: 2px 0;
      border-radius: 6px;
      background: transparent;
      color: #233a55;
      font-size: 16px;
      line-height: 1.45;
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .card-edit-textarea {
      min-height: 150px;
      padding: 8px 10px;
      line-height: 1.45;
    }

    .category-empty {
      color: var(--muted);
      font-weight: 700;
    }

    .content:hover {
      background: #f1f8ff;
      color: var(--blue-900);
    }

    .content:focus-visible {
      outline: 3px solid rgba(25, 118, 210, 0.24);
      outline-offset: 2px;
    }

    .long-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      padding: 2px 0 8px;
    }

    .long-title {
      color: var(--blue-900);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .long-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 2px;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .empty {
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--blue-900);
      font-size: 20px;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 10;
      max-width: min(360px, calc(100% - 40px));
      padding: 13px 16px;
      border-radius: 8px;
      background: #062c5b;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 16px 40px rgba(4, 32, 69, 0.32);
      opacity: 0;
      text-align: center;
      transform: translate(-50%, -50%) scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 640px);
        padding: 20px 0;
      }

      .topbar {
        align-items: stretch;
      }

      .sort-select {
        width: 100%;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .settings-add-row,
      .category-row {
        grid-template-columns: 1fr;
      }

      .editor-fields {
        grid-template-columns: 1fr;
      }

      .bulk-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .prompt-card {
        gap: 8px;
      }

      .long-summary {
        grid-template-columns: 1fr;
      }

      .long-actions {
        justify-content: flex-start;
      }

      .mobile-order-actions {
        display: flex;
      }

      .long-actions .btn,
      .order-cell .order-button {
        width: auto;
      }

      .category-cell {
        flex-basis: 96px;
        font-size: 12px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        display: grid;
      }

      .count-pill {
        width: 100%;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <h1>PROMPT-STOCK</h1>
        <div class="sync-status" id="syncStatus" aria-live="polite">ローカル保存</div>
      </div>
      <div class="count-pill" aria-live="polite">
        <strong id="totalCount">0</strong>
        <span>登録済み</span>
      </div>
    </header>

    <section class="layout">
      <section class="panel app-box" aria-label="PROMPT-STOCK">
        <div class="account-actions" id="accountActions">
          <span class="account-user" id="accountUser">未ログイン</span>
          <button class="btn btn-secondary" id="loginButton" type="button">ログイン</button>
          <button class="btn btn-secondary" id="refreshButton" type="button" hidden>更新</button>
          <button class="btn btn-secondary" id="logoutButton" type="button" hidden>ログアウト</button>
        </div>
        <div class="view" id="mainView">
          <div class="type-tabs" role="tablist" aria-label="文言タイプ">
            <button class="tab-button is-active" id="shortTabButton" type="button" role="tab" aria-selected="true" data-type="short">short</button>
            <button class="tab-button" id="longTabButton" type="button" role="tab" aria-selected="false" data-type="long">long</button>
          </div>
          <div class="toolbar">
            <div class="search">
              <span class="search-icon" aria-hidden="true"></span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="文言・カテゴリで検索">
            </div>
            <select class="sort-select" id="filterCategorySelect" aria-label="カテゴリで絞り込み"></select>
            <select class="sort-select" id="sortSelect" aria-label="並び替え">
              <option value="manual">任意順</option>
              <option value="newest">新しい順</option>
              <option value="oldest">古い順</option>
              <option value="short">短い順</option>
            </select>
            <div class="bulk-actions" aria-label="選択した文言の操作">
              <button class="btn btn-primary" id="openAddButton" type="button">追加</button>
              <button class="btn btn-edit" id="editSelectedButton" type="button" disabled>編集</button>
              <button class="btn btn-delete" id="deleteSelectedButton" type="button" disabled>削除</button>
            </div>
            <button class="btn btn-secondary icon-button" id="settingsButton" type="button" aria-label="設定">⚙</button>
          </div>
          <form class="editor" id="promptForm">
            <div class="select-cell" aria-hidden="true">
              <span class="fake-checkbox"></span>
            </div>
            <div class="inline-editor">
              <div class="editor-fields">
                <input class="title-field" id="promptTitle" type="text" autocomplete="off" aria-label="タイトル" placeholder="タイトルを入力">
                <select class="category-select" id="promptCategory" aria-label="カテゴリ"></select>
                <textarea id="promptBody" rows="6" aria-label="文言" placeholder="文言を入力"></textarea>
              </div>
              <div class="form-actions">
                <button class="btn btn-primary" id="submitButton" type="submit">追加</button>
                <button class="btn btn-secondary" id="cancelButton" type="button">キャンセル</button>
              </div>
            </div>
          </form>
          <div class="prompt-list" id="promptList"></div>
        </div>
        <div class="view" id="settingsView" hidden>
          <div class="settings-header">
            <button class="btn btn-secondary" id="backSettingsButton" type="button">← 戻る</button>
            <h2>設定</h2>
          </div>
          <section class="settings-section" aria-label="カテゴリ管理">
            <h3>カテゴリ管理</h3>
            <div class="settings-add-row">
              <input id="settingsCategoryNameInput" type="text" autocomplete="off" placeholder="新しいカテゴリ名">
              <button class="btn btn-primary" id="addSettingsCategoryButton" type="button">カテゴリ追加</button>
            </div>
            <div class="category-list" id="settingsCategoryList"></div>
          </section>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./firebase-config.js"></script>
  <script src="./firebase-config.local.js"></script>
  <script>
    const STORAGE_KEY = "prompt-copy-app-items";
    const CATEGORY_STORAGE_KEY = "prompt-copy-app-categories";
    const FIREBASE_CONFIG = window.PROMPT_STOCK_FIREBASE_CONFIG || window.PROMPT_COPY_FIREBASE_CONFIG || {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: "",
      measurementId: "",
    };
    const SYNC_DOCUMENT_ID = "main";
    const FIRESTORE_USER_COLLECTION = "promptCopyApp";
    const DEFAULT_LONG_CATEGORY_NAMES = ["BOOTH", "note", "Discord"];

    const elements = {
      mainView: document.getElementById("mainView"),
      settingsView: document.getElementById("settingsView"),
      form: document.getElementById("promptForm"),
      title: document.getElementById("promptTitle"),
      body: document.getElementById("promptBody"),
      promptCategory: document.getElementById("promptCategory"),
      shortTabButton: document.getElementById("shortTabButton"),
      longTabButton: document.getElementById("longTabButton"),
      openAddButton: document.getElementById("openAddButton"),
      settingsButton: document.getElementById("settingsButton"),
      backSettingsButton: document.getElementById("backSettingsButton"),
      submitButton: document.getElementById("submitButton"),
      cancelButton: document.getElementById("cancelButton"),
      search: document.getElementById("searchInput"),
      filterCategory: document.getElementById("filterCategorySelect"),
      sort: document.getElementById("sortSelect"),
      settingsCategoryNameInput: document.getElementById("settingsCategoryNameInput"),
      addSettingsCategoryButton: document.getElementById("addSettingsCategoryButton"),
      settingsCategoryList: document.getElementById("settingsCategoryList"),
      editSelectedButton: document.getElementById("editSelectedButton"),
      deleteSelectedButton: document.getElementById("deleteSelectedButton"),
      list: document.getElementById("promptList"),
      count: document.getElementById("totalCount"),
      syncStatus: document.getElementById("syncStatus"),
      accountActions: document.getElementById("accountActions"),
      accountUser: document.getElementById("accountUser"),
      loginButton: document.getElementById("loginButton"),
      refreshButton: document.getElementById("refreshButton"),
      logoutButton: document.getElementById("logoutButton"),
      toast: document.getElementById("toast"),
    };

    let categories = loadCategories();
    let prompts = loadPrompts();
    let editingId = null;
    let selectedIds = new Set();
    let toastTimer = null;
    let currentUser = null;
    let isApplyingRemoteData = false;
    let authReadyTimer = null;
    let refreshTimer = null;
    let hasInitializedCategoryFilter = false;
    let activeType = "short";
    let draggedPromptId = null;
    let draggedCategoryId = null;
    let currentView = "main";
    ensureDefaultLongCategories();
    saveLocalData();

    function loadPrompts() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(saved)) return [];
        return saved
          .map(normalizePrompt)
          .filter((prompt) => prompt.body);
      } catch {
        return [];
      }
    }

    function savePrompts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
      saveRemoteData();
    }

    function loadCategories() {
      try {
        const saved = JSON.parse(localStorage.getItem(CATEGORY_STORAGE_KEY));
        if (!Array.isArray(saved)) return [];
        return saved
          .map((category, index) => normalizeCategory(category, index))
          .filter((category) => category.name);
      } catch {
        return [];
      }
    }

    function saveCategories() {
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
      saveRemoteData();
    }

    function normalizePrompt(prompt) {
      const type = prompt.type === "long" ? "long" : "short";
      const body = String(prompt.body || (type === "short" ? prompt.title : "") || "").trim();
      const title = type === "long" ? String(prompt.title || "").trim() : "";
      return {
        id: prompt.id || createId(),
        type,
        title,
        body,
        categoryId: prompt.categoryId || "",
        order: Number.isFinite(Number(prompt.order))
          ? Number(prompt.order)
          : -Number(prompt.updatedAt || prompt.createdAt || Date.now()),
        createdAt: Number(prompt.createdAt || Date.now()),
        updatedAt: Number(prompt.updatedAt || prompt.createdAt || Date.now()),
      };
    }

    function normalizeCategory(category, index = 0) {
      return {
        id: category.id || createId(),
        type: category.type === "long" ? "long" : "short",
        name: String(category.name || "").trim(),
        order: Number.isFinite(Number(category.order)) ? Number(category.order) : index * 1000,
      };
    }

    function ensureDefaultLongCategories() {
      const originalOrder = categories.map((category) => `${category.id}:${category.order}`).join("\n");
      let changed = false;
      const defaultLongCategories = DEFAULT_LONG_CATEGORY_NAMES.map((name) => {
        const existing = categories.find((category) => category.type === "long" && category.name === name);
        if (existing) return existing;
        changed = true;
        return { id: createId(), type: "long", name, order: 0 };
      });
      const defaultNameSet = new Set(DEFAULT_LONG_CATEGORY_NAMES);
      const nonLongCategories = categories.filter((category) => category.type !== "long");
      const otherLongCategories = categories.filter((category) => (
        category.type === "long" && !defaultNameSet.has(category.name)
      ));

      categories = [...nonLongCategories, ...defaultLongCategories, ...otherLongCategories];
      normalizeCategoryOrder("long");
      const nextOrder = categories.map((category) => `${category.id}:${category.order}`).join("\n");
      return changed || originalOrder !== nextOrder;
    }

    function isFirebaseConfigured() {
      return Boolean(
        FIREBASE_CONFIG.apiKey &&
        FIREBASE_CONFIG.authDomain &&
        FIREBASE_CONFIG.projectId &&
        FIREBASE_CONFIG.appId
      );
    }

    function isAuthLocked() {
      return isFirebaseConfigured() && !currentUser;
    }

    function getAuthErrorMessage(error, action) {
      const code = error?.code || "";
      const message = error?.message || "";
      if (code === "auth/unauthorized-domain") {
        return `${action}失敗: Firebase Authenticationの承認済みドメインに、現在開いているドメインを追加してください（${code}）`;
      }
      if (code === "auth/popup-blocked") {
        return `${action}失敗: ポップアップがブロックされました。ブラウザ設定を確認してください（${code}）`;
      }
      if (code === "auth/operation-not-allowed") {
        return `${action}失敗: Firebase AuthenticationでGoogleログインを有効にしてください（${code}）`;
      }
      const detail = [code, message].filter(Boolean).join(": ");
      return detail ? `${action}失敗: ${detail}` : `${action}に失敗しました`;
    }

    function getFirebaseConfigStatus() {
      if (!window.PROMPT_STOCK_FIREBASE_CONFIG && !window.PROMPT_COPY_FIREBASE_CONFIG) {
        return "firebase-config.js未読込";
      }
      if (!isFirebaseConfigured()) {
        return "firebase-config.js読込済み / 設定不足";
      }
      return `firebase-config.js読込済み / ${FIREBASE_CONFIG.projectId}`;
    }

    function setSyncStatus(message) {
      elements.syncStatus.textContent = message;
    }

    function setSignedOutUi(message = "ログインするとクラウド同期します") {
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = "未ログイン";
      elements.loginButton.hidden = false;
      elements.loginButton.disabled = false;
      elements.refreshButton.hidden = true;
      elements.refreshButton.disabled = false;
      elements.logoutButton.hidden = true;
      elements.logoutButton.disabled = false;
      setSyncStatus(`${message}（${getFirebaseConfigStatus()}）`);
    }

    function setSignedInUi(user) {
      const name = user.displayName || user.email || "ログイン中";
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = name;
      elements.loginButton.hidden = true;
      elements.loginButton.disabled = false;
      elements.refreshButton.hidden = false;
      elements.refreshButton.disabled = false;
      elements.logoutButton.hidden = false;
      elements.logoutButton.disabled = false;
    }

    function setAuthErrorUi(message) {
      elements.accountActions.hidden = false;
      elements.accountUser.textContent = "同期エラー";
      elements.loginButton.hidden = false;
      elements.loginButton.disabled = true;
      elements.refreshButton.hidden = true;
      elements.logoutButton.hidden = true;
      setSyncStatus(message);
    }

    function startAuthReadyTimer() {
      clearTimeout(authReadyTimer);
      authReadyTimer = setTimeout(() => {
        setSignedOutUi("認証の確認に時間がかかっています。ログインボタンから再ログインしてください");
      }, 8000);
    }

    function stopAuthReadyTimer() {
      clearTimeout(authReadyTimer);
      authReadyTimer = null;
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => {
        refreshRemoteData({ silent: true });
      }, 15000);
    }

    function stopAutoRefresh() {
      clearInterval(refreshTimer);
      refreshTimer = null;
    }

    function toFirestoreValue(value) {
      if (value === null || value === undefined) return { nullValue: null };
      if (Array.isArray(value)) {
        return { arrayValue: { values: value.map(toFirestoreValue) } };
      }
      if (typeof value === "object") {
        return {
          mapValue: {
            fields: Object.fromEntries(
              Object.entries(value).map(([key, item]) => [key, toFirestoreValue(item)])
            ),
          },
        };
      }
      if (typeof value === "number") {
        return Number.isInteger(value) ? { integerValue: String(value) } : { doubleValue: value };
      }
      if (typeof value === "boolean") return { booleanValue: value };
      return { stringValue: String(value) };
    }

    function fromFirestoreValue(value) {
      if (!value || typeof value !== "object") return null;
      if ("stringValue" in value) return value.stringValue;
      if ("integerValue" in value) return Number(value.integerValue);
      if ("doubleValue" in value) return Number(value.doubleValue);
      if ("booleanValue" in value) return Boolean(value.booleanValue);
      if ("nullValue" in value) return null;
      if ("arrayValue" in value) {
        return (value.arrayValue.values || []).map(fromFirestoreValue);
      }
      if ("mapValue" in value) {
        return Object.fromEntries(
          Object.entries(value.mapValue.fields || {}).map(([key, item]) => [key, fromFirestoreValue(item)])
        );
      }
      return null;
    }

    function fromFirestoreFields(fields) {
      return Object.fromEntries(
        Object.entries(fields || {}).map(([key, value]) => [key, fromFirestoreValue(value)])
      );
    }

    function decodeJwtPayload(token) {
      try {
        const payload = token.split(".")[1] || "";
        const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(atob(normalized));
      } catch {
        return {};
      }
    }

    async function getAuthContext(user, forceRefresh = false) {
      const token = await user.getIdToken(forceRefresh);
      const payload = decodeJwtPayload(token);
      return {
        token,
        uid: payload.user_id || payload.sub || user.uid,
      };
    }

    function getFirestoreDocumentPath(uid) {
      return `users/${uid}/${FIRESTORE_USER_COLLECTION}/${SYNC_DOCUMENT_ID}`;
    }

    function getCurrentFirestorePath() {
      return currentUser ? getFirestoreDocumentPath(currentUser.uid) : "未ログイン";
    }

    function getFirestoreRestUrl(uid) {
      const projectId = encodeURIComponent(FIREBASE_CONFIG.projectId);
      const databaseId = encodeURIComponent("(default)");
      return `https://firestore.googleapis.com/v1/projects/${projectId}/databases/${databaseId}/documents/${getFirestoreDocumentPath(encodeURIComponent(uid))}`;
    }

    async function getRestErrorMessage(response, action) {
      let detail = "";
      try {
        const body = await response.json();
        detail = body?.error?.message ? `: ${body.error.message}` : "";
      } catch {
        try {
          const text = await response.text();
          detail = text ? `: ${text.slice(0, 160)}` : "";
        } catch {
          detail = "";
        }
      }
      if (detail.includes("Cloud Firestore API has not been used") || detail.includes("is disabled")) {
        return `REST${action}失敗 ${response.status}: Cloud Firestore APIが無効です。Google Cloud ConsoleでFirestore APIを有効化してください`;
      }
      return `REST${action}失敗 ${response.status}${detail}`;
    }

    async function readRemoteDataViaRest(user) {
      const { token, uid } = await getAuthContext(user);
      const response = await fetch(getFirestoreRestUrl(uid), {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (response.status === 404) return false;
      if (!response.ok) {
        throw new Error(await getRestErrorMessage(response, "読み込み"));
      }
      const documentData = await response.json();
      applyRemoteData(fromFirestoreFields(documentData.fields));
      return true;
    }

    async function writeRemoteDataViaRest(user, data) {
      const { token, uid } = await getAuthContext(user, true);
      const response = await fetch(getFirestoreRestUrl(uid), {
        method: "PATCH",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          fields: Object.fromEntries(
            Object.entries(data).map(([key, value]) => [key, toFirestoreValue(value)])
          ),
        }),
      });
      if (!response.ok) {
        throw new Error(await getRestErrorMessage(response, "保存"));
      }
    }

    function saveLocalData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
      localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
    }

    async function setupRemoteSync() {
      setSignedOutUi("同期を確認中...");

      if (!isFirebaseConfigured()) {
        setAuthErrorUi("Firebase設定が読み込まれていません。GitHub SecretsとActionsの公開結果を確認してください。");
        return;
      }

      try {
        setSyncStatus("Firebase Authを準備中...");
        const firebaseApp = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
        const authModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
        const app = firebaseApp.initializeApp(FIREBASE_CONFIG);
        const auth = authModule.getAuth(app);
        const provider = new authModule.GoogleAuthProvider();

        function handleLoginError(error, action) {
          showToast("ログインできませんでした");
          setSignedOutUi(getAuthErrorMessage(error, action));
        }

        elements.loginButton.addEventListener("click", () => {
          setSyncStatus("ログイン画面を開いています...");
          elements.loginButton.disabled = true;
          authModule.signInWithPopup(auth, provider).catch((error) => {
            handleLoginError(error, "ポップアップログイン");
          });
        });
        elements.refreshButton.addEventListener("click", () => {
          refreshRemoteData();
        });
        elements.logoutButton.addEventListener("click", () => {
          stopAutoRefresh();
          authModule.signOut(auth).catch(() => {
            showToast("ログアウトできませんでした");
          });
        });

        startAuthReadyTimer();
        authModule.getRedirectResult(auth).then(() => {
          setSyncStatus("リダイレクトログイン結果を確認しました");
        }).catch((error) => {
          const detail = error && error.message ? `: ${error.message}` : "";
          setSignedOutUi(`リダイレクトログインの確認に失敗しました${detail}`);
        });

        authModule.onAuthStateChanged(auth, async (user) => {
          stopAuthReadyTimer();
          stopAutoRefresh();

          if (!user) {
            currentUser = null;
            setSignedOutUi();
            render();
            return;
          }

          currentUser = user;
          setSignedInUi(user);
          await refreshRemoteData();
          startAutoRefresh();
        });
      } catch (error) {
        currentUser = null;
        stopAuthReadyTimer();
        stopAutoRefresh();
        const detail = error && error.message ? `: ${error.message}` : "";
        setAuthErrorUi(`Firebase初期化エラー${detail}`);
      }
    }

    function applyRemoteData(data) {
      isApplyingRemoteData = true;
      prompts = Array.isArray(data.prompts)
        ? data.prompts.map(normalizePrompt).filter((prompt) => prompt.body)
        : [];
      categories = Array.isArray(data.categories)
        ? data.categories.map((category, index) => normalizeCategory(category, index)).filter((category) => category.name)
        : [];
      const shouldSaveDefaultLongCategories = ensureDefaultLongCategories();
      selectedIds = new Set([...selectedIds].filter((id) => prompts.some((prompt) => prompt.id === id)));
      if (editingId && !prompts.some((prompt) => prompt.id === editingId)) {
        resetForm();
      }
      saveLocalData();
      render();
      isApplyingRemoteData = false;
      if (shouldSaveDefaultLongCategories) {
        saveCategories();
      }
    }

    function getRemotePayload() {
      return {
        prompts,
        categories,
        updatedAt: Date.now(),
      };
    }

    async function refreshRemoteData(options = {}) {
      if (!currentUser) return;
      const silent = Boolean(options.silent);
      if (editingId) {
        if (!silent) setSyncStatus("編集中のため、再読み込みを一時停止しています");
        return;
      }
      try {
        if (!silent) setSyncStatus("クラウドから読み込み中...");
        const found = await readRemoteDataViaRest(currentUser);
        if (!found) {
          await writeRemoteDataViaRest(currentUser, getRemotePayload());
          setSyncStatus(`読み込み成功: 保存先を作成しました（${getCurrentFirestorePath()}）`);
          return;
        }
        if (!silent) setSyncStatus(`読み込み成功（${getCurrentFirestorePath()}）`);
      } catch (error) {
        const detail = error && error.message ? `: ${error.message}` : "";
        setSyncStatus(`読み込み失敗。更新ボタンで再読み込みしてください${detail}`);
      }
    }

    async function writeRemoteData() {
      if (!currentUser || isApplyingRemoteData) return;
      try {
        setSyncStatus("クラウドに保存中...");
        await writeRemoteDataViaRest(currentUser, getRemotePayload());
        setSyncStatus(`保存成功（${getCurrentFirestorePath()}）`);
        await refreshRemoteData({ silent: true });
      } catch (error) {
        const detail = error && error.message ? `: ${error.message}` : "";
        setSyncStatus(`保存失敗（${getCurrentFirestorePath()}）${detail}`);
      }
    }

    function saveRemoteData() {
      if (!currentUser || isApplyingRemoteData) return;
      writeRemoteData();
    }

    function createId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function getCategoryName(categoryId) {
      return categories.find((category) => category.id === categoryId)?.name || "";
    }

    function getCategoriesByType(type) {
      return [...categories]
        .filter((category) => category.type === type)
        .sort((a, b) => {
          const orderDiff = Number(a.order || 0) - Number(b.order || 0);
          if (orderDiff !== 0) return orderDiff;
          return a.name.localeCompare(b.name, "ja");
        });
    }

    function normalizeCategoryOrder(type) {
      const ordered = getCategoriesByType(type);
      const orderById = new Map(ordered.map((category, index) => [category.id, index * 1000]));
      categories = categories.map((category) => (
        orderById.has(category.id) ? { ...category, order: orderById.get(category.id) } : category
      ));
    }

    function getEffectiveCategory(prompt) {
      return categories.find((category) => category.id === prompt.categoryId && category.type === prompt.type) || null;
    }

    function getTypeLabel(type) {
      return type === "long" ? "長文" : "短文";
    }

    function getPromptLabel(prompt) {
      return prompt.type === "long" ? prompt.title || prompt.body : prompt.body;
    }

    function getLongCopyText(prompt) {
      return prompt.title ? `${prompt.title}\n\n${prompt.body}` : prompt.body;
    }

    function getNextOrder(type) {
      const typePrompts = prompts.filter((prompt) => prompt.type === type);
      if (typePrompts.length === 0) return 0;
      return Math.min(...typePrompts.map((prompt) => Number(prompt.order || 0))) - 1000;
    }

    function sortByManualOrder(items) {
      return [...items].sort((a, b) => {
        const orderDiff = Number(a.order || 0) - Number(b.order || 0);
        if (orderDiff !== 0) return orderDiff;
        return b.updatedAt - a.updatedAt;
      });
    }

    function normalizeManualOrder(type) {
      const ordered = sortByManualOrder(prompts.filter((prompt) => prompt.type === type));
      const orderById = new Map(ordered.map((prompt, index) => [prompt.id, index * 1000]));
      prompts = prompts.map((prompt) => (
        orderById.has(prompt.id) ? { ...prompt, order: orderById.get(prompt.id) } : prompt
      ));
    }

    function getDefaultCategoryId() {
      return getCategoriesByType(activeType).find((category) => category.name === "AI")?.id || "";
    }

    function createCategorySelect(selectedCategoryId, type = activeType) {
      const typeCategories = getCategoriesByType(type);
      const select = document.createElement("select");
      select.className = "category-select";
      select.setAttribute("aria-label", "カテゴリ");

      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = "カテゴリなし";
      select.appendChild(emptyOption);

      typeCategories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = category.name;
        select.appendChild(option);
      });

      select.value = typeCategories.some((category) => category.id === selectedCategoryId)
        ? selectedCategoryId
        : "";
      return select;
    }

    function getVisiblePrompts() {
      const query = normalize(elements.search.value);
      const filterCategoryId = elements.filterCategory.value;
      const filtered = prompts.filter((prompt) => {
        const effectiveCategory = getEffectiveCategory(prompt);
        const effectiveCategoryId = effectiveCategory?.id || "";
        if (prompt.type !== activeType) return false;
        if (filterCategoryId === "__none" && effectiveCategoryId) return false;
        if (filterCategoryId && filterCategoryId !== "__none" && effectiveCategoryId !== filterCategoryId) return false;
        if (!query) return true;
        return normalize(prompt.body).includes(query) ||
          normalize(prompt.title || "").includes(query) ||
          normalize(effectiveCategory?.name || "").includes(query);
      });

      return filtered.sort((a, b) => {
        if (elements.sort.value === "manual") {
          const orderDiff = Number(a.order || 0) - Number(b.order || 0);
          if (orderDiff !== 0) return orderDiff;
          return b.updatedAt - a.updatedAt;
        }
        if (elements.sort.value === "oldest") {
          return a.updatedAt - b.updatedAt;
        }
        if (elements.sort.value === "short") {
          return a.body.length - b.body.length;
        }
        return b.updatedAt - a.updatedAt;
      });
    }

    function render() {
      const locked = isAuthLocked();
      if (locked) {
        currentView = "main";
      }
      elements.mainView.hidden = currentView !== "main";
      elements.settingsView.hidden = currentView !== "settings";
      renderCategoryOptions();
      renderTypeTabs();
      renderSettings();
      const visiblePrompts = getVisiblePrompts();
      const activeTypeCount = prompts.filter((prompt) => prompt.type === activeType).length;
      elements.count.textContent = locked ? "0" : activeTypeCount.toString();
      elements.shortTabButton.disabled = locked;
      elements.longTabButton.disabled = locked;
      elements.openAddButton.disabled = locked;
      elements.settingsButton.disabled = locked;
      elements.search.disabled = locked;
      elements.filterCategory.disabled = locked;
      elements.sort.disabled = locked;
      updateBulkActions();
      elements.list.innerHTML = "";

      if (currentView === "settings") {
        return;
      }

      if (locked) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "<strong>ログインしてください</strong><span>ログイン後にクラウドの保存内容を表示します。</span>";
        elements.list.appendChild(empty);
        return;
      }

      if (visiblePrompts.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = activeTypeCount === 0
          ? `<strong>${getTypeLabel(activeType)}はまだ登録がありません</strong><span>追加ボタンから登録できます。</span>`
          : "<strong>該当する文言がありません</strong><span>検索条件を変えてみてください。</span>";
        elements.list.appendChild(empty);
        return;
      }

      visiblePrompts.forEach((prompt, index) => {
        const isEditing = editingId === prompt.id;
        const card = document.createElement("article");
        card.className = selectedIds.has(prompt.id) ? "prompt-card selected" : "prompt-card";
        card.draggable = elements.sort.value === "manual" && !isEditing;
        card.dataset.promptId = prompt.id;
        card.addEventListener("dragstart", (event) => handleDragStart(event, prompt.id));
        card.addEventListener("dragover", (event) => handleDragOver(event, prompt.id));
        card.addEventListener("dragleave", () => card.classList.remove("is-drop-target"));
        card.addEventListener("drop", (event) => handleDrop(event, prompt.id));
        card.addEventListener("dragend", clearDragState);

        const selectCell = document.createElement("label");
        selectCell.className = "select-cell";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selectedIds.has(prompt.id);
        checkbox.setAttribute("aria-label", "この文言を選択");
        checkbox.addEventListener("change", () => toggleSelection(prompt.id, checkbox.checked));

        const fakeCheckbox = document.createElement("span");
        fakeCheckbox.className = "fake-checkbox";
        fakeCheckbox.setAttribute("aria-hidden", "true");

        const orderCell = document.createElement("div");
        orderCell.className = "order-cell";

        const dragHandle = document.createElement("button");
        dragHandle.type = "button";
        dragHandle.className = "drag-handle";
        dragHandle.textContent = "⋮⋮";
        dragHandle.disabled = elements.sort.value !== "manual" || isEditing;
        dragHandle.setAttribute("aria-label", "ドラッグして並び替え");
        dragHandle.addEventListener("mousedown", () => {
          if (elements.sort.value !== "manual") {
            elements.sort.value = "manual";
            render();
          }
        });

        const mobileOrderActions = document.createElement("div");
        mobileOrderActions.className = "mobile-order-actions";

        const moveUpButton = document.createElement("button");
        moveUpButton.type = "button";
        moveUpButton.className = "order-button";
        moveUpButton.textContent = "↑";
        moveUpButton.disabled = elements.sort.value !== "manual" || index === 0;
        moveUpButton.setAttribute("aria-label", "この文言を上へ移動");
        moveUpButton.addEventListener("click", () => movePrompt(prompt.id, -1));

        const moveDownButton = document.createElement("button");
        moveDownButton.type = "button";
        moveDownButton.className = "order-button";
        moveDownButton.textContent = "↓";
        moveDownButton.disabled = elements.sort.value !== "manual" || index === visiblePrompts.length - 1;
        moveDownButton.setAttribute("aria-label", "この文言を下へ移動");
        moveDownButton.addEventListener("click", () => movePrompt(prompt.id, 1));

        mobileOrderActions.append(moveUpButton, moveDownButton);
        orderCell.append(dragHandle, mobileOrderActions);

        let main = document.createElement("div");
        main.className = "prompt-main";

        const categoryCell = document.createElement("div");
        categoryCell.className = "category-cell";

        if (isEditing) {
          const categorySelect = createCategorySelect(prompt.categoryId, prompt.type);
          categoryCell.appendChild(categorySelect);

          const editForm = document.createElement("form");
          editForm.className = "prompt-main";

          let titleInput = null;
          if (prompt.type === "long") {
            titleInput = document.createElement("input");
            titleInput.type = "text";
            titleInput.value = prompt.title || "";
            titleInput.setAttribute("aria-label", "タイトルを編集");
            titleInput.placeholder = "タイトルを入力";
          }

          const textarea = document.createElement("textarea");
          textarea.className = "card-edit-textarea";
          textarea.value = prompt.body;
          textarea.rows = 6;
          textarea.setAttribute("aria-label", "文言を編集");

          const actions = document.createElement("div");
          actions.className = "form-actions";

          const saveButton = document.createElement("button");
          saveButton.className = "btn btn-primary";
          saveButton.type = "submit";
          saveButton.textContent = "保存";

          const cancelButton = document.createElement("button");
          cancelButton.className = "btn btn-secondary";
          cancelButton.type = "button";
          cancelButton.textContent = "キャンセル";
          cancelButton.addEventListener("click", () => {
            resetForm();
            render();
          });

          editForm.addEventListener("submit", (event) => {
            event.preventDefault();
            updatePrompt(prompt.id, textarea.value, categorySelect.value, titleInput ? titleInput.value : "");
          });

          actions.append(saveButton, cancelButton);
          if (titleInput) {
            editForm.append(titleInput);
          }
          editForm.append(textarea, actions);
          main = editForm;
        } else {
          const categoryName = getEffectiveCategory(prompt)?.name || "";
          categoryCell.textContent = categoryName || "カテゴリなし";
          if (!categoryName) {
            categoryCell.classList.add("category-empty");
          }

          if (prompt.type === "long") {
            const summary = document.createElement("div");
            summary.className = "long-summary";

            const title = document.createElement("div");
            title.className = "long-title";
            title.textContent = prompt.title || "タイトルなし";

            const actions = document.createElement("div");
            actions.className = "long-actions";

            const bodyCopyButton = document.createElement("button");
            bodyCopyButton.type = "button";
            bodyCopyButton.className = "btn btn-primary";
            bodyCopyButton.textContent = "本文コピー";
            bodyCopyButton.addEventListener("click", () => copyPrompt(prompt.body));

            actions.append(bodyCopyButton);
            summary.append(title, actions);
            main.append(summary);
          } else {
            const content = document.createElement("button");
            content.type = "button";
            content.className = "content";
            content.textContent = prompt.body;
            content.addEventListener("click", () => copyPrompt(prompt.body));
            main.append(content);
          }
        }

        selectCell.append(checkbox, fakeCheckbox);
        card.append(selectCell, orderCell, categoryCell, main);
        elements.list.appendChild(card);
      });
    }

    function renderCategoryOptions() {
      const currentPromptCategory = elements.promptCategory.value;
      const currentFilterCategory = elements.filterCategory.value;
      const typeCategories = getCategoriesByType(activeType);

      elements.promptCategory.innerHTML = '<option value="">カテゴリなし</option>';
      elements.filterCategory.innerHTML = '<option value="">すべてのカテゴリ</option><option value="__none">カテゴリなし</option>';

      typeCategories.forEach((category) => {
        const promptOption = document.createElement("option");
        promptOption.value = category.id;
        promptOption.textContent = category.name;
        elements.promptCategory.appendChild(promptOption);

        const filterOption = document.createElement("option");
        filterOption.value = category.id;
        filterOption.textContent = category.name;
        elements.filterCategory.appendChild(filterOption);
      });

      if (typeCategories.some((category) => category.id === currentPromptCategory)) {
        elements.promptCategory.value = currentPromptCategory;
      }
      if (currentFilterCategory === "__none" || typeCategories.some((category) => category.id === currentFilterCategory)) {
        elements.filterCategory.value = currentFilterCategory;
      } else if (!hasInitializedCategoryFilter) {
        elements.filterCategory.value = getDefaultCategoryId();
        hasInitializedCategoryFilter = true;
      }
    }

    function renderSettings() {
      elements.settingsCategoryList.innerHTML = "";
      const typeCategories = getCategoriesByType(activeType);
      typeCategories.forEach((category, index) => {
        const row = document.createElement("div");
        row.className = "category-row";
        row.draggable = true;
        row.dataset.categoryId = category.id;
        row.addEventListener("dragstart", (event) => handleCategoryDragStart(event, category.id));
        row.addEventListener("dragover", (event) => handleCategoryDragOver(event, category.id));
        row.addEventListener("dragleave", () => row.classList.remove("is-drop-target"));
        row.addEventListener("drop", (event) => handleCategoryDrop(event, category.id));
        row.addEventListener("dragend", clearCategoryDragState);

        const orderCell = document.createElement("div");
        orderCell.className = "order-cell";

        const dragHandle = document.createElement("button");
        dragHandle.type = "button";
        dragHandle.className = "drag-handle";
        dragHandle.textContent = "⋮⋮";
        dragHandle.setAttribute("aria-label", "ドラッグしてカテゴリを並び替え");

        const mobileOrderActions = document.createElement("div");
        mobileOrderActions.className = "mobile-order-actions";

        const moveUpButton = document.createElement("button");
        moveUpButton.type = "button";
        moveUpButton.className = "order-button";
        moveUpButton.textContent = "↑";
        moveUpButton.disabled = index === 0;
        moveUpButton.setAttribute("aria-label", "このカテゴリを上へ移動");
        moveUpButton.addEventListener("click", () => moveCategory(category.id, -1));

        const moveDownButton = document.createElement("button");
        moveDownButton.type = "button";
        moveDownButton.className = "order-button";
        moveDownButton.textContent = "↓";
        moveDownButton.disabled = index === typeCategories.length - 1;
        moveDownButton.setAttribute("aria-label", "このカテゴリを下へ移動");
        moveDownButton.addEventListener("click", () => moveCategory(category.id, 1));

        mobileOrderActions.append(moveUpButton, moveDownButton);
        orderCell.append(dragHandle, mobileOrderActions);

        const input = document.createElement("input");
        input.type = "text";
        input.value = category.name;
        input.setAttribute("aria-label", `${category.name} のカテゴリ名`);

        const renameButton = document.createElement("button");
        renameButton.type = "button";
        renameButton.className = "btn btn-edit";
        renameButton.textContent = "名称変更";
        renameButton.addEventListener("click", () => renameCategory(category.id, input.value));

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "btn btn-delete";
        deleteButton.textContent = "削除";
        deleteButton.addEventListener("click", () => deleteCategory(category.id));

        row.append(orderCell, input, renameButton, deleteButton);
        elements.settingsCategoryList.appendChild(row);
      });

      if (elements.settingsCategoryList.children.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "<strong>カテゴリがありません</strong><span>新しいカテゴリを追加できます。</span>";
        elements.settingsCategoryList.appendChild(empty);
      }
    }

    function renderTypeTabs() {
      const isShort = activeType === "short";
      elements.shortTabButton.classList.toggle("is-active", isShort);
      elements.longTabButton.classList.toggle("is-active", !isShort);
      elements.shortTabButton.setAttribute("aria-selected", String(isShort));
      elements.longTabButton.setAttribute("aria-selected", String(!isShort));
      elements.form.classList.toggle("is-long", !isShort);
      elements.body.placeholder = isShort ? "文言を入力" : "本文を入力";
      elements.body.setAttribute("aria-label", isShort ? "文言" : "本文");
    }

    function switchType(type) {
      if (activeType === type) return;
      activeType = type;
      selectedIds = new Set();
      elements.settingsCategoryNameInput.value = "";
      resetForm();
      render();
    }

    function updateBulkActions() {
      if (isAuthLocked()) {
        elements.editSelectedButton.disabled = true;
        elements.deleteSelectedButton.disabled = true;
        elements.editSelectedButton.textContent = "編集";
        elements.deleteSelectedButton.textContent = "削除";
        return;
      }
      const selectedCount = selectedIds.size;
      elements.editSelectedButton.disabled = selectedCount !== 1;
      elements.deleteSelectedButton.disabled = selectedCount === 0;
      elements.editSelectedButton.textContent = selectedCount === 1 ? "編集" : "編集";
      elements.deleteSelectedButton.textContent = selectedCount > 0 ? `削除 (${selectedCount})` : "削除";
    }

    function toggleSelection(id, checked) {
      if (checked) {
        selectedIds.add(id);
      } else {
        selectedIds.delete(id);
      }
      render();
    }

    function clearDragState() {
      draggedPromptId = null;
      elements.list.querySelectorAll(".prompt-card").forEach((card) => {
        card.classList.remove("is-dragging", "is-drop-target");
      });
    }

    function handleDragStart(event, id) {
      if (elements.sort.value !== "manual" || editingId === id) {
        event.preventDefault();
        return;
      }
      draggedPromptId = id;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", id);
      event.currentTarget.classList.add("is-dragging");
    }

    function handleDragOver(event, targetId) {
      if (!draggedPromptId || draggedPromptId === targetId || elements.sort.value !== "manual") return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      event.currentTarget.classList.add("is-drop-target");
    }

    function handleDrop(event, targetId) {
      event.preventDefault();
      const sourceId = draggedPromptId || event.dataTransfer.getData("text/plain");
      clearDragState();
      if (!sourceId || sourceId === targetId) return;
      movePromptTo(sourceId, targetId);
    }

    function movePrompt(id, direction) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      if (elements.sort.value !== "manual") {
        elements.sort.value = "manual";
      }
      normalizeManualOrder(activeType);
      const visiblePrompts = getVisiblePrompts();
      const currentIndex = visiblePrompts.findIndex((prompt) => prompt.id === id);
      const targetIndex = currentIndex + direction;
      if (currentIndex < 0 || targetIndex < 0 || targetIndex >= visiblePrompts.length) return;

      const current = visiblePrompts[currentIndex];
      const target = visiblePrompts[targetIndex];
      const currentOrder = current.order;
      const targetOrder = target.order;
      prompts = prompts.map((prompt) => {
        if (prompt.id === current.id) return { ...prompt, order: targetOrder };
        if (prompt.id === target.id) return { ...prompt, order: currentOrder };
        return prompt;
      });
      savePrompts();
      render();
    }

    function movePromptTo(sourceId, targetId) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      if (elements.sort.value !== "manual") {
        elements.sort.value = "manual";
      }
      normalizeManualOrder(activeType);
      const visiblePrompts = getVisiblePrompts();
      const sourceIndex = visiblePrompts.findIndex((prompt) => prompt.id === sourceId);
      const targetIndex = visiblePrompts.findIndex((prompt) => prompt.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;

      const reordered = [...visiblePrompts];
      const [moved] = reordered.splice(sourceIndex, 1);
      reordered.splice(targetIndex, 0, moved);
      const orderById = new Map(reordered.map((prompt, index) => [prompt.id, index * 1000]));
      prompts = prompts.map((prompt) => (
        orderById.has(prompt.id) ? { ...prompt, order: orderById.get(prompt.id) } : prompt
      ));
      savePrompts();
      render();
    }

    function clearCategoryDragState() {
      draggedCategoryId = null;
      elements.settingsCategoryList.querySelectorAll(".category-row").forEach((row) => {
        row.classList.remove("is-dragging", "is-drop-target");
      });
    }

    function handleCategoryDragStart(event, id) {
      draggedCategoryId = id;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", id);
      event.currentTarget.classList.add("is-dragging");
    }

    function handleCategoryDragOver(event, targetId) {
      if (!draggedCategoryId || draggedCategoryId === targetId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      event.currentTarget.classList.add("is-drop-target");
    }

    function handleCategoryDrop(event, targetId) {
      event.preventDefault();
      const sourceId = draggedCategoryId || event.dataTransfer.getData("text/plain");
      clearCategoryDragState();
      if (!sourceId || sourceId === targetId) return;
      moveCategoryTo(sourceId, targetId);
    }

    function moveCategory(id, direction) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      normalizeCategoryOrder(activeType);
      const typeCategories = getCategoriesByType(activeType);
      const currentIndex = typeCategories.findIndex((category) => category.id === id);
      const targetIndex = currentIndex + direction;
      if (currentIndex < 0 || targetIndex < 0 || targetIndex >= typeCategories.length) return;
      const current = typeCategories[currentIndex];
      const target = typeCategories[targetIndex];
      const currentOrder = current.order;
      const targetOrder = target.order;
      categories = categories.map((category) => {
        if (category.id === current.id) return { ...category, order: targetOrder };
        if (category.id === target.id) return { ...category, order: currentOrder };
        return category;
      });
      saveCategories();
      render();
    }

    function moveCategoryTo(sourceId, targetId) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      normalizeCategoryOrder(activeType);
      const typeCategories = getCategoriesByType(activeType);
      const sourceIndex = typeCategories.findIndex((category) => category.id === sourceId);
      const targetIndex = typeCategories.findIndex((category) => category.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;
      const reordered = [...typeCategories];
      const [moved] = reordered.splice(sourceIndex, 1);
      reordered.splice(targetIndex, 0, moved);
      const orderById = new Map(reordered.map((category, index) => [category.id, index * 1000]));
      categories = categories.map((category) => (
        orderById.has(category.id) ? { ...category, order: orderById.get(category.id) } : category
      ));
      saveCategories();
      render();
    }

    function resetForm() {
      editingId = null;
      elements.form.reset();
      elements.form.classList.remove("is-open");
      elements.form.classList.toggle("is-long", activeType === "long");
      elements.submitButton.textContent = "追加";
      elements.promptCategory.value = getDefaultCategoryId();
    }

    function openAddPrompt() {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      editingId = null;
      elements.form.reset();
      elements.form.classList.add("is-open");
      elements.form.classList.toggle("is-long", activeType === "long");
      elements.submitButton.textContent = "追加";
      elements.promptCategory.value = getDefaultCategoryId();
      if (activeType === "long") {
        elements.title.focus();
      } else {
        elements.body.focus();
      }
      render();
    }

    function startEdit(id) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      const prompt = prompts.find((item) => item.id === id);
      if (!prompt) return;

      editingId = id;
      elements.form.classList.remove("is-open");
      render();
      const textarea = elements.list.querySelector(".card-edit-textarea");
      if (textarea) {
        textarea.focus();
        textarea.setSelectionRange(textarea.value.length, textarea.value.length);
      }
    }

    function updatePrompt(id, rawBody, categoryId, rawTitle = "") {
      const body = rawBody.trim();
      if (!body) {
        showToast("本文を入力してください");
        return;
      }

      const now = Date.now();
      prompts = prompts.map((prompt) => (
        prompt.id === id
          ? {
            ...prompt,
            body,
            categoryId,
            title: prompt.type === "long" ? rawTitle.trim() : "",
            updatedAt: now,
          }
          : prompt
      ));
      editingId = null;
      savePrompts();
      render();
      showToast("更新しました");
    }

    function openSettings() {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      currentView = "settings";
      resetForm();
      selectedIds = new Set();
      render();
      elements.settingsCategoryNameInput.focus();
    }

    function closeSettings() {
      currentView = "main";
      elements.settingsCategoryNameInput.value = "";
      render();
    }

    function deletePrompt(id) {
      const prompt = prompts.find((item) => item.id === id);
      if (!prompt) return;

      const preview = prompt.body.length > 30 ? `${prompt.body.slice(0, 30)}...` : prompt.body;
      const confirmed = window.confirm(`「${getPromptLabel(prompt).slice(0, 30) || preview}」を削除しますか？`);
      if (!confirmed) return;

      prompts = prompts.filter((item) => item.id !== id);
      selectedIds.delete(id);
      if (editingId === id) {
        resetForm();
      }
      savePrompts();
      render();
      showToast("削除しました");
    }

    function editSelectedPrompt() {
      if (selectedIds.size !== 1) {
        showToast("編集する文言を1つだけ選択してください");
        return;
      }
      startEdit([...selectedIds][0]);
    }

    function deleteSelectedPrompts() {
      if (selectedIds.size === 0) {
        showToast("削除する文言を選択してください");
        return;
      }

      const targets = prompts.filter((prompt) => selectedIds.has(prompt.id));
      const confirmed = window.confirm(`${targets.length}件の文言を削除しますか？`);
      if (!confirmed) return;

      prompts = prompts.filter((prompt) => !selectedIds.has(prompt.id));
      if (editingId && selectedIds.has(editingId)) {
        resetForm();
      }
      selectedIds = new Set();
      savePrompts();
      render();
      showToast("削除しました");
    }

    async function copyPrompt(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
        showToast("コピーしました");
      } catch {
        fallbackCopy(text);
        showToast("コピーしました");
      }
    }

    function fallbackCopy(text) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      elements.toast.textContent = message;
      elements.toast.classList.add("show");
      toastTimer = setTimeout(() => {
        elements.toast.classList.remove("show");
      }, 1800);
    }

    elements.form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }

      const body = elements.body.value.trim();
      const title = activeType === "long" ? elements.title.value.trim() : "";
      const categoryId = elements.promptCategory.value;

      if (!body) {
        showToast(activeType === "long" ? "本文を入力してください" : "文言を入力してください");
        return;
      }

      const now = Date.now();

      if (editingId) {
        prompts = prompts.map((prompt) => {
          if (prompt.id !== editingId) return prompt;
          return {
            ...prompt,
            body,
            categoryId,
            title: prompt.type === "long" ? title : "",
            updatedAt: now,
          };
        });
        showToast("更新しました");
      } else {
        prompts.unshift({
          id: createId(),
          type: activeType,
          title,
          body,
          categoryId,
          order: getNextOrder(activeType),
          createdAt: now,
          updatedAt: now,
        });
        showToast("追加しました");
      }

      savePrompts();
      selectedIds = new Set();
      resetForm();
      render();
    });

    function addCategory() {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      const name = elements.settingsCategoryNameInput.value.trim();
      if (!name) {
        showToast("カテゴリ名を入力してください");
        return;
      }
      if (categories.some((category) => category.type === activeType && category.name === name)) {
        showToast("同じカテゴリがあります");
        return;
      }
      const typeCategories = getCategoriesByType(activeType);
      const lastOrder = typeCategories.length > 0
        ? Math.max(...typeCategories.map((category) => Number(category.order || 0)))
        : -1000;
      const category = { id: createId(), type: activeType, name, order: lastOrder + 1000 };
      categories.push(category);
      saveCategories();
      elements.settingsCategoryNameInput.value = "";
      render();
      elements.promptCategory.value = category.id;
      if (category.name === "AI") {
        elements.filterCategory.value = category.id;
      }
      showToast("カテゴリを追加しました");
    }

    function renameCategory(id, rawName) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      const name = rawName.trim();
      const targetCategory = categories.find((category) => category.id === id && category.type === activeType);
      if (!id) {
        showToast("カテゴリを選択してください");
        return;
      }
      if (!targetCategory) {
        showToast("このタブのカテゴリを選択してください");
        return;
      }
      if (!name) {
        showToast("カテゴリ名を入力してください");
        return;
      }
      if (categories.some((category) => category.id !== id && category.type === activeType && category.name === name)) {
        showToast("同じカテゴリがあります");
        return;
      }
      categories = categories.map((category) => (
        category.id === id ? { ...category, name } : category
      ));
      saveCategories();
      render();
      showToast("カテゴリ名を変更しました");
    }

    function deleteCategory(id) {
      if (isAuthLocked()) {
        showToast("ログインしてください");
        return;
      }
      const targetCategory = categories.find((category) => category.id === id && category.type === activeType);
      if (!id) {
        showToast("カテゴリを選択してください");
        return;
      }
      if (!targetCategory) {
        showToast("このタブのカテゴリを選択してください");
        return;
      }
      const categoryName = getCategoryName(id);
      const confirmed = window.confirm(`カテゴリ「${categoryName}」を削除しますか？\nこのカテゴリの文言は「カテゴリなし」になります。`);
      if (!confirmed) return;

      categories = categories.filter((category) => category.id !== id);
      prompts = prompts.map((prompt) => (
        prompt.categoryId === id ? { ...prompt, categoryId: "" } : prompt
      ));
      saveCategories();
      savePrompts();
      elements.settingsCategoryNameInput.value = "";
      render();
      showToast("カテゴリを削除しました");
    }

    elements.openAddButton.addEventListener("click", openAddPrompt);
    elements.shortTabButton.addEventListener("click", () => switchType("short"));
    elements.longTabButton.addEventListener("click", () => switchType("long"));
    elements.settingsButton.addEventListener("click", openSettings);
    elements.backSettingsButton.addEventListener("click", closeSettings);
    elements.cancelButton.addEventListener("click", resetForm);
    elements.search.addEventListener("input", render);
    elements.filterCategory.addEventListener("change", render);
    elements.sort.addEventListener("change", render);
    elements.addSettingsCategoryButton.addEventListener("click", addCategory);
    elements.settingsCategoryNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addCategory();
      }
    });
    elements.editSelectedButton.addEventListener("click", editSelectedPrompt);
    elements.deleteSelectedButton.addEventListener("click", deleteSelectedPrompts);

    render();
    setupRemoteSync();
  </script>
</body>
</html>
